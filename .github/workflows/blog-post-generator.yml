name: Auto-Generate Blog Post

on:
  # Run 3 times per week (Monday, Wednesday, Friday at 9 AM UTC)
  schedule:
    - cron: '0 9 * * 1'  # Monday
    - cron: '0 9 * * 3'  # Wednesday
    - cron: '0 9 * * 5'  # Friday

  # Manual trigger with custom topics
  workflow_dispatch:
    inputs:
      topic:
        description: 'Blog post topic (e.g., "How to reduce false positives in QRadar")'
        required: false
        type: string
      keywords:
        description: 'Target keywords (comma-separated, optional)'
        required: false
        type: string

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate SEO-optimized blog post with Claude
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
          KEYWORDS: ${{ github.event.inputs.keywords }}
        run: |
          chmod +x scripts/generate-blog-seo.js
          node scripts/generate-blog-seo.js

      - name: Lint and type check
        run: |
          npx tsc --noEmit
          npm run lint

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'feat: Auto-generate blog post'
          title: 'Auto-Generated Blog: ${{ steps.generate.outputs.title }}'
          body: |
            **Auto-Generated Blog Post**

            Title: ${{ steps.generate.outputs.title }}
            Slug: ${{ steps.generate.outputs.slug }}
            Keywords: ${{ github.event.inputs.keywords || 'Auto-selected' }}

            This blog post was automatically generated by Claude AI based on your voice and expertise.

            ⚠️ **Please review carefully before merging:**
            - [ ] Verify accuracy of technical details
            - [ ] Check SEO keywords are naturally incorporated
            - [ ] Ensure tone matches existing posts
            - [ ] Review for any corrections needed
          branch: auto/blog-${{ github.run_number }}
          delete-branch: true
